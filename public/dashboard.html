<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
  <div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold mb-4">Your Attendance</h1>
    <div class="mb-4">
      <label class="mr-2">User ID:</label>
      <input type="number" id="userId" class="border rounded px-2" />
      <button id="loadBtn" class="bg-blue-600 text-white px-4 py-1 rounded ml-2">Load</button>
    </div>
    <div>
      <table class="w-full bg-white rounded shadow">
        <thead class="bg-gray-200">
          <tr>
            <th class="px-4 py-2">Time</th>
            <th class="px-4 py-2">Action</th>
          </tr>
        </thead>
        <tbody id="logTable"></tbody>
      </table>
    </div>
    <div class="mt-6">
      <h2 class="text-lg font-semibold mb-2">Generate report</h2>
      <select id="interval" class="border rounded px-2 py-1">
        <option value="day">Daily</option>
        <option value="week">Weekly</option>
        <option value="month">Monthly</option>
      </select>
      <button id="reportBtn" class="bg-green-600 text-white px-4 py-1 rounded ml-2">Get Report</button>
      <div id="reportArea" class="mt-4"></div>
    </div>
  </div>

  <script>
    document.getElementById('loadBtn').addEventListener('click', async () => {
      const id = document.getElementById('userId').value;
      const res = await fetch(`/api/logs/user/${id}`);
      if (!res.ok) return alert('Failed to load logs');
      const logs = await res.json();
      const tbody = document.getElementById('logTable');
      tbody.innerHTML = '';
      logs.forEach(l => {
        const row = document.createElement('tr');
        row.innerHTML = `<td class="border px-4 py-2">${l.timestamp}</td><td class="border px-4 py-2">${l.action}</td>`;
        tbody.appendChild(row);
      });
    });

    document.getElementById('reportBtn').addEventListener('click', async () => {
      const interval = document.getElementById('interval').value;
      const res = await fetch(`/api/logs/report?interval=${interval}`);
      if (!res.ok) return alert('Failed to fetch report');
      const rows = await res.json();
      const div = document.getElementById('reportArea');
      div.innerHTML = '<h3 class="font-semibold">Report</h3>';
      rows.forEach(r => {
        const p = document.createElement('p');
        p.textContent = `${r.timestamp} - ${r.name} (${r.email}) - ${r.action}`;
        div.appendChild(p);
      });
    });
  </script>
</body>
</html>
