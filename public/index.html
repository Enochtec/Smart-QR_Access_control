<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | Smart Gate Access Control</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen py-12 px-4">
  <div class="max-w-4xl mx-auto">
    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-gray-800 mb-2">Smart Gate Access Control</h1>
      <p class="text-gray-600">Register for secure entry and attendance tracking</p>
    </div>

    <!-- Registration Form -->
    <div class="bg-white rounded-lg shadow-lg p-8 md:p-12">
      <form id="registrationForm" class="space-y-6">
        <!-- Personal Information Section -->
        <div class="border-b pb-6">
          <h2 class="text-xl font-semibold text-gray-800 mb-4">Personal Information</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">First Name *</label>
              <input type="text" id="firstName" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="John" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Last Name *</label>
              <input type="text" id="lastName" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Doe" />
            </div>
          </div>
        </div>

        <!-- Contact Information Section -->
        <div class="border-b pb-6">
          <h2 class="text-xl font-semibold text-gray-800 mb-4">Contact Information</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Email Address *</label>
              <input type="email" id="email" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="john@example.com" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number *</label>
              <input type="tel" id="phone" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="+1 (555) 123-4567" />
            </div>
          </div>
        </div>

        <!-- Organization & Role Section -->
        <div class="border-b pb-6">
          <h2 class="text-xl font-semibold text-gray-800 mb-4">Organization Details</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Employee ID *</label>
              <input type="text" id="employeeId" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="EMP-12345" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Department *</label>
              <select id="department" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">Select a department</option>
                <option value="IT">IT</option>
                <option value="HR">Human Resources</option>
                <option value="Finance">Finance</option>
                <option value="Operations">Operations</option>
                <option value="Marketing">Marketing</option>
                <option value="Sales">Sales</option>
                <option value="Engineering">Engineering</option>
                <option value="Other">Other</option>
              </select>
            </div>
          </div>
          <div class="mt-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Job Title *</label>
            <input type="text" id="jobTitle" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="e.g., Software Engineer, Manager" />
          </div>
        </div>

        <!-- Additional Details Section -->
        <div class="border-b pb-6">
          <h2 class="text-xl font-semibold text-gray-800 mb-4">Additional Details</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Date of Birth (optional)</label>
              <input type="date" id="dob" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Blood Type (optional)</label>
              <select id="bloodType" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">Select blood type</option>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Photo & Emergency Contact -->
        <div class="border-b pb-6">
          <h2 class="text-xl font-semibold text-gray-800 mb-4">Photo & Emergency Contact</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Photo URL (optional)</label>
              <input type="url" id="photo" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="https://example.com/photo.jpg" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Emergency Contact Name (optional)</label>
              <input type="text" id="emergencyContact" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Jane Doe" />
            </div>
          </div>
          <div class="mt-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">Emergency Contact Phone (optional)</label>
            <input type="tel" id="emergencyPhone" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="+1 (555) 987-6543" />
          </div>
        </div>

        <!-- Notification Preferences -->
        <div class="border-b pb-6">
          <h2 class="text-xl font-semibold text-gray-800 mb-4">Notification Preferences</h2>
          <div class="space-y-3">
            <label class="flex items-center">
              <input type="radio" name="notificationFrequency" value="daily" checked class="w-4 h-4 text-blue-600" />
              <span class="ml-3 text-gray-700">Daily Report</span>
            </label>
            <label class="flex items-center">
              <input type="radio" name="notificationFrequency" value="weekly" class="w-4 h-4 text-blue-600" />
              <span class="ml-3 text-gray-700">Weekly Report</span>
            </label>
            <label class="flex items-center">
              <input type="radio" name="notificationFrequency" value="monthly" class="w-4 h-4 text-blue-600" />
              <span class="ml-3 text-gray-700">Monthly Report</span>
            </label>
          </div>
        </div>

        <!-- Terms & Conditions -->
        <div class="pb-6">
          <label class="flex items-start">
            <input type="checkbox" id="terms" required class="w-4 h-4 mt-1 text-blue-600" />
            <span class="ml-3 text-sm text-gray-700">I accept the <a href="#" class="text-blue-600 hover:underline">Terms and Conditions</a> and <a href="#" class="text-blue-600 hover:underline">Privacy Policy</a> *</span>
          </label>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-3 rounded-lg font-semibold hover:from-blue-700 hover:to-indigo-700 transition duration-200">
          Register & Generate QR Code
        </button>

        <!-- Message Area -->
        <div id="message" class="hidden p-4 rounded-lg text-sm"></div>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('registrationForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const firstName = document.getElementById('firstName').value;
      const lastName = document.getElementById('lastName').value;
      const name = `${firstName} ${lastName}`;
      const email = document.getElementById('email').value;
      const phone = document.getElementById('phone').value;
      const employeeId = document.getElementById('employeeId').value;
      const department = document.getElementById('department').value;
      const jobTitle = document.getElementById('jobTitle').value;
      const photo = document.getElementById('photo').value;
      const notificationFrequency = document.querySelector('input[name="notificationFrequency"]:checked').value;
      
      const messageDiv = document.getElementById('message');
      messageDiv.classList.remove('hidden', 'bg-red-100', 'text-red-700');

      try {
        const res = await fetch('/api/users/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            name, 
            email, 
            phone,
            employeeId,
            department,
            jobTitle,
            photo,
            notificationFrequency
          }),
        });

        if (!res.ok) {
          const err = await res.json();
          messageDiv.textContent = 'Failed: ' + err.message;
          messageDiv.classList.add('bg-red-100', 'text-red-700');
          return;
        }

        const data = await res.json();
        messageDiv.textContent = 'Registration successful! Redirecting...';
        messageDiv.classList.add('bg-green-100', 'text-green-700');
        
        setTimeout(() => {
          const params = new URLSearchParams({ id: data.id });
          window.location.href = '/card.html?' + params.toString();
        }, 1500);
      } catch (err) {
        messageDiv.textContent = 'Error: ' + err.message;
        messageDiv.classList.add('bg-red-100', 'text-red-700');
      }
    });
  </script>
</body>
</html>
